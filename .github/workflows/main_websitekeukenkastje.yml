name: Build and deploy Websitekeukenkastje

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  DOTNET_VERSION: '10.0.x'
  PYTHON_VERSION: '3.11'
  PUBLIC_API_BASE_URL: https://dummy.local

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build

      # API build (optioneel)
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: dotnet publish api/api.csproj --configuration Release --output ${{ github.workspace }}/artifact-api

      # Python validation
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate Python environment
        working-directory: AI-model
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Combine deployment package
      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -r client/* deploy/
          cp -r artifact-api/* deploy/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: website

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Websitekeukenkastje
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_23FA7EA156C84F829DE1147F1B7E4DBE }}
          package: .
