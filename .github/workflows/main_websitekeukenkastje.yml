name: Build and deploy Keukenkastje

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  DOTNET_VERSION: '10.0.x'
  PYTHON_VERSION: '3.11'
  PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          PUBLIC_API_BASE_URL: ${{ env.PUBLIC_API_BASE_URL }}

      - name: Prepare frontend package
        run: |
          mkdir deploy-frontend
          cp -r client/build deploy-frontend/build
          cp client/package.json deploy-frontend/
          cp client/package-lock.json deploy-frontend/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: deploy-frontend

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Websitekeukenkastje
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_23FA7EA156C84F829DE1147F1B7E4DBE }}
          package: .

  build-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: dotnet publish api/api.csproj --configuration Release --output api-publish

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: api-publish

  deploy-api:
    runs-on: ubuntu-latest
    needs: build-api

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api

      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: keukenkastje-api
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: .